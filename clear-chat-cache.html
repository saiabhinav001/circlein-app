<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear ChatBot Cache</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .success {
            display: none;
            color: #27ae60;
            font-size: 1.2rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear ChatBot Cache</h1>
        <p>This will clear the old chat history and cache, allowing you to see the new voice mode implementation and updated welcome message.</p>
        <button onclick="clearCache()">Clear Cache Now</button>
        <div class="success" id="success">✅ Cache cleared successfully! You can now reload your app.</div>
    </div>

    <script>
        function clearCache() {
            localStorage.removeItem('circlein-chat-history-v2');
            localStorage.removeItem('circlein-voice-auto-send');
            sessionStorage.clear();
            
            // Show success message
            document.getElementById('success').style.display = 'block';
            
            // Disable button
            event.target.disabled = true;
            event.target.style.opacity = '0.5';
            
            console.log('✅ Cache cleared:');
            console.log('- Removed: circlein-chat-history-v2');
            console.log('- Removed: circlein-voice-auto-send');
            console.log('- Cleared: sessionStorage');
            
            setTimeout(() => {
                alert('Cache cleared! Now reload your CircleIn app to see the new changes.');
            }, 500);
        }
    </script>
</body>
</html>
